services:
  app_banco:
    build: .
    container_name: app_banco
    restart: always
    volumes:
      - .:/app
      - /home/rh2025/servidor/sistemas/banco_de_preguntas/media:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=PregRh.settings
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1
    networks:
      - app-network

  nginx_banco:
    image: nginx:alpine
    container_name: nginx_banco
    restart: always
    ports:
      - "8003:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /home/rh2025/servidor/sistemas/banco_de_preguntas/media:/app/media
      - /home/rh2025/servidor/sistemas/banco_de_preguntas/staticfiles:/app/staticfiles
    networks:
      - app-network
    depends_on:
      - app_banco

networks:
  app-network:
    external: true