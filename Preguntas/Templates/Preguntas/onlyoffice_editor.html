{% extends 'Preguntas/home.html' %}

{% block content %}
<div class="container-fluid mt-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="bi bi-file-earmark-word"></i> Editor: {{ pregunta.nombre }}</h4>
        <a href="{% url 'pregunta-list' %}" class="btn btn-outline-danger btn-sm">
            <i class="bi bi-x-circle"></i> Salir del Editor
        </a>
    </div>
    
    <div id="placeholder" style="border: 1px solid #ddd; border-radius: 4px; overflow: hidden;"></div>
</div>

<script type="text/javascript" src="{{ ONLYOFFICE_API_URL }}/web-apps/apps/api/documents/api.js"></script>

<script>
    var config = {
        "width": "100%",
        "height": "750px",
        "documentType": "word",
        "token": "{{ DOC_TOKEN }}",
        "document": {
            "fileType": "{{ PAYLOAD.document.fileType }}",
            "key": "{{ PAYLOAD.document.key }}",
            "title": "{{ PAYLOAD.document.title }}",
            "url": "{{ PAYLOAD.document.url }}",
            "permissions": {
                "edit": true,
                "download": false,   // Bloquea descarga
                "print": false,      // Bloquea impresión
                "copy": true,        // Permite copiar texto
                "comment": true
            }
        },
        "editorConfig": {
            "callbackUrl": "{{ PAYLOAD.editorConfig.callbackUrl }}",
            "user": {
                "id": "{{ PAYLOAD.editorConfig.user.id }}",
                "name": "{{ PAYLOAD.editorConfig.user.name }}"
            },
            "mode": "edit",
            "lang": "es",
            "customization": {
                "forcesave": true,    // HABILITA el botón de guardado (disquete)
                "chat": false,        // Oculta el chat
                "help": false,        // Oculta ayuda
                "autosave": true,     // Guardado automático activado
                "compactHeader": true // Menú más pequeño para más espacio
            }
        }
    };

    try {
        var docEditor = new DocsAPI.DocEditor("placeholder", config);
    } catch (e) {
        console.error("Error al cargar OnlyOffice:", e);
        alert("Error de conexión con el Document Server.");
    }
</script>
{% endblock %}
