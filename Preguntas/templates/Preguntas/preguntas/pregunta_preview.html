<!DOCTYPE html>
<html>

<head>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #placeholder {
            height: 100%;
            width: 100%;
        }
    </style>
</head>

<body>
    <div id="placeholder"></div>

    <script type="text/javascript"
        src="https://office.academiaroberthooke.com/web-apps/apps/api/documents/api.js"></script>
    <script>
        // 1. Parseamos los strings JSON que vienen del View
        const docData = JSON.parse('{{ PAYLOAD.document|safe }}');
        const editorCfg = JSON.parse('{{ PAYLOAD.editorConfig|safe }}');

        var config = {
            "document": docData, // Pasamos el objeto completo ya parseado
            "documentType": "word",
            "token": "{{ DOC_TOKEN|safe }}",
            "editorConfig": editorCfg,
            "width": "100%",
            "height": "100%"
        };

        // Forzamos modo lectura por si acaso
        config.editorConfig.mode = "view";
        config.document.permissions.edit = false;

        try {
            new DocsAPI.DocEditor("placeholder", config);
        } catch (e) {
            console.error("Error al cargar el preview:", e);
        }
    </script>
</body>

</html>
