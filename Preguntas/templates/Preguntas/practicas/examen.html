{% extends 'Preguntas/home.html' %}
{% block title %}Examen{% endblock %}

{% block content %}
<script src="https://office.academiaroberthooke.com/web-apps/apps/api/documents/api.js" type="text/javascript"></script>

<style>
/* Diseño Responsivo (Mobile-First) */
.container-exam {
    display: flex;
    flex-direction: column;
    gap: 15px;
    padding-top: 15px;
}
.left {
    width: 100%;
    height: 500px; /* Altura segura para móviles */
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.right {
    width: 100%;
    background: #f9fafc;
    padding: 15px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

@media (min-width: 992px) {
    .container-exam {
        flex-direction: row;
        height: calc(100vh - 100px);
    }
    .left {
        width: 70%;
        height: 100%;
    }
    .right {
        width: 30%;
        height: 100%;
        overflow-y: auto;
    }
}

.card-pregunta {
    background: white;
    padding: 10px 15px;
    border-radius: 8px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid rgba(0,0,0,0.08);
}
.opciones button {
    border: 1px solid #e0e7ff;
    margin: 2px;
    width: 35px;
    height: 35px;
    border-radius: 6px;
    background: #f8f9fa;
    font-weight: 600;
    color: #495057;
    cursor: pointer;
    transition: all 0.2s;
}
.opciones button:hover {
    background: #e0e7ff;
}
.opciones button.active {
    background: #4f46e5;
    border-color: #4f46e5;
    color: white;
}

#timer-container {
    position: fixed;
    top: 20px;
    right: 20px;
    background: white;
    color: #4f46e5;
    padding: 8px 16px;
    border-radius: 50px;
    font-size: 1.25rem;
    font-weight: 700;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    border: 2px solid #4f46e5;
    z-index: 1050;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s ease;
}

#timer-container.danger {
    color: #dc3545;
    border-color: #dc3545;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.4); }
    70% { box-shadow: 0 0 0 10px rgba(220, 53, 69, 0); }
    100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
}
</style>

<div id="timer-container">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>
    </svg>
    <span id="timer-text">--:--</span>
</div>

<div class="container-fluid py-2">
    <div class="container-exam">
        
        <div class="left">
            <div id="editor" style="width: 100%; height: 100%;"></div>
        </div>

        <div class="right">
            <form id="form-examen" method="POST">
                {% csrf_token %}
                
                {% for pp in preguntas %}
                <div class="card-pregunta">
                    <strong class="text-secondary">{{ forloop.counter }}</strong>
                    <div class="opciones">
                        {% for op in "ABCDE" %}
                        <button type="button" onclick="selectOption(this, '{{ pp.id }}', '{{ op }}')">
                            {{ op }}
                        </button>
                        {% endfor %}
                    </div>
                    <input type="hidden" name="pregunta_{{ pp.id }}" id="input_{{ pp.id }}">
                </div>
                {% endfor %}
                
                <button type="submit" class="btn btn-primary w-100 mt-3 py-2 fw-bold" style="background: #4f46e5; border-radius: 8px;">
                    Finalizar Simulacro
                </button>
            </form>
        </div>
    </div>
</div>

<script>
function selectOption(btn, id, value) {
    let container = btn.parentElement;
    container.querySelectorAll("button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("input_" + id).value = value;
}
</script>

{{ config|json_script:"onlyoffice-config" }}
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const configNode = document.getElementById('onlyoffice-config');
        if (configNode) {
            const config = JSON.parse(configNode.textContent);
            
            // Ajustes para maximizar el espacio de lectura en móviles
            if (!config.editorConfig) config.editorConfig = {};
            if (!config.editorConfig.customization) config.editorConfig.customization = {};
            config.editorConfig.customization.compactHeader = true;
            config.editorConfig.customization.toolbarNoTabs = true;

            if (typeof DocsAPI !== 'undefined') {
                new DocsAPI.DocEditor("editor", config);
            } else {
                console.error("No se pudo cargar la librería DocsAPI de ONLYOFFICE.");
            }
        }
    });
</script>

<script>    
    const storageKey = "examen_end_time_{{ practica.uuid }}";
    let endTime = localStorage.getItem(storageKey);

    if (!endTime) {
        const minutosTotales = {{ practica.tiempo_minutos }};
        endTime = Date.now() + (minutosTotales * 60 * 1000);
        localStorage.setItem(storageKey, endTime);
    } else {
        endTime = parseInt(endTime);
    }

    function updateTimer() {
        const now = Date.now();
        let tiempoRestante = Math.floor((endTime - now) / 1000);

        if (tiempoRestante <= 0) {
            document.getElementById("timer-text").innerText = "00:00";
            localStorage.removeItem(storageKey);
            document.getElementById("form-examen").submit(); 
            return; 
        }

        let min = Math.floor(tiempoRestante / 60);
        let sec = tiempoRestante % 60;
        document.getElementById("timer-text").innerText = `${min}:${sec.toString().padStart(2,'0')}`;
        
        const timerContainer = document.getElementById("timer-container");
        if (tiempoRestante <= 180) {
            timerContainer.classList.add("danger");
        }
    }
    
    updateTimer(); 
    setInterval(updateTimer, 1000);

    document.getElementById("form-examen").addEventListener("submit", function() {
        localStorage.removeItem(storageKey);
    });
</script>
{% endblock %}
